name: Deploy to GitHub Pages

on:
  # 监听 main 分支的 push 事件
  push:
    branches:
      - main
      - master
  # 允许手动触发
  workflow_dispatch:

# 设置权限，允许 Actions 推送到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保不会同时进行多个部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 指向 vite 构建出的 dist 目录
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
